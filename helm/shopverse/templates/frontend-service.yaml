apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.serviceName }}
  labels:
    app: shopverse
    component: frontend
  {{- with .Values.frontend.serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.serviceType | default "ClusterIP" }}
  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: 80
      protocol: TCP
  selector:
    app: shopverse
    component: frontend
