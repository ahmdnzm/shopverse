apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.serviceName }}
  labels:
    app: shopverse
    component: backend
  {{- with .Values.backend.serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.serviceType | default "ClusterIP" }}
  ports:
    - port: {{ .Values.backend.servicePort }}
      targetPort: 8080
      protocol: TCP
  selector:
    app: shopverse
    component: backend
